# -*- conf -*-
# {{ scheme_name }}
{% if author %}
# made by {{ author }}
{% endif %}

{% if Dark_Theme %}
[colors-dark]
{% else %}
[main]
initial-color-theme=light

[colors-light]
{% endif %}
{% if Cursor_Color and Cursor_Text_Color %}
cursor={{ Cursor_Text_Color.hex }} {{ Cursor_Color.hex }}
{% endif %}
background={{ Background_Color.hex }}
foreground={{ Foreground_Color.hex }}
selection-foreground={{ Selected_Text_Color.hex }}
selection-background={{ Selection_Color.hex }}
regular0={{ Ansi_0_Color.hex }}  # black
regular1={{ Ansi_1_Color.hex }}  # red
regular2={{ Ansi_2_Color.hex }}  # green
regular3={{ Ansi_3_Color.hex }}  # yellow
regular4={{ Ansi_4_Color.hex }}  # blue
regular5={{ Ansi_5_Color.hex }}  # magenta
regular6={{ Ansi_6_Color.hex }}  # cyan
regular7={{ Ansi_7_Color.hex }}  # white
bright0={{ Ansi_8_Color.hex }}   # bright black
bright1={{ Ansi_9_Color.hex }}   # bright red
bright2={{ Ansi_10_Color.hex }}   # bright green
bright3={{ Ansi_11_Color.hex }}   # bright yellow
bright4={{ Ansi_12_Color.hex }}   # bright blue
bright5={{ Ansi_13_Color.hex }}   # bright magenta
bright6={{ Ansi_14_Color.hex }}   # bright cyan
bright7={{ Ansi_15_Color.hex }}   # bright white
