# Copied from https://gitlab.gnome.org/chergert/ptyxis/-/blob/50.1/src/palettes/gnome.palette?ref_type=tags
name: "Adwaita Dark"

color_01: "#241f31"
color_02: "#c01c28"
color_03: "#2ec27e"
color_04: "#f5c211"
color_05: "#1e78e4"
color_06: "#9841bb"
color_07: "#0ab9dc"
color_08: "#c0bfbc"

color_09: "#5e5c64"
color_10: "#ed333b"
color_11: "#57e389"
color_12: "#f8e45c"
color_13: "#51a1ff"
color_14: "#c061cb"
color_15: "#4fd2fd"
color_16: "#f6f5f4"

background: "#1c1c1f"
foreground: "#ffffff"
cursor: "#ffffff"
cursor_text: "#1c1c1f"
# GNOME Terminal and Ptyxis handle selection by swapping each character's
# foreground/background color, which we can't match with these settings.
# We match what would happen on normal text.
selection: "#ffffff"
selection_text: "#1c1c1f"

# These concepts don't exist in GNOME Terminal and Ptyxis.
badge: "#ff2600"
cursor_guide: "#b3ecff"
link: "#6699cc"
